{% extends "base.html" %}

{% block title %}Production Lots{% endblock %}

{% block content %}
<div class="upf-root">
<div class="production-lots-container">
    <div id="alert-container"></div>

    <div class="page-header">
        <h1 class="page-title">Production Lots</h1>
        <button class="button primary" onclick="productionLots.createNew()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Create Production Lot
        </button>
    </div>

    <div class="filter-bar">
        <input type="text"
               class="search-input"
               id="search-input"
               placeholder="Search by lot number or process name..."
               onkeyup="productionLots.handleSearch()">

        <select class="filter-select" id="status-filter" onchange="productionLots.applyFilters()">
            <option value="">All Statuses</option>
            <option value="Planning">Planning</option>
            <option value="Ready">Ready</option>
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Failed">Failed</option>
        </select>

        <select class="filter-select" id="process-filter" onchange="productionLots.applyFilters()">
            <option value="">All Processes</option>
        </select>
    </div>

    <div class="lots-table-container">
        <table class="lots-table">
            <thead>
                <tr>
                    <th>Lot Number</th>
                    <th>Process</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Alerts</th>
                    <th>Total Cost</th>
                    <th>Created By</th>
                    <th>Created At</th>
                </tr>
            </thead>
            <tbody id="lots-table-body">
                <tr>
                    <td colspan="8" class="empty-state">
                        <div>📦</div>
                        <div>No production lots found</div>
                    </td>
                </tr>
            </tbody>
        </table>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/production_lots.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        productionLots.init();
    });
</script>
</div>
{% endblock %}
